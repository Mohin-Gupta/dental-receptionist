<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1800" viewBox="0 0 2600 1800">
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M 0 0 L 13 6.5 L 0 13 z" fill="#3c3633"/>
    </marker>
    <style>
      .bg { fill: #f3f1ed; }
      .title { font: 92px Georgia, serif; fill: #070707; }
      .subtitle { font: 28px Arial, sans-serif; fill: #171717; }
      .laneTitle { font: 30px Arial, sans-serif; font-weight: 700; fill: #070707; }
      .section { font: 34px Arial, sans-serif; font-weight: 700; fill: #070707; }
      .boxTitle { font: 25px Arial, sans-serif; font-weight: 700; fill: #070707; }
      .text { font: 21px Arial, sans-serif; fill: #070707; }
      .small { font: 18px Arial, sans-serif; fill: #070707; }
      .mono { font: 17px Menlo, Consolas, monospace; fill: #070707; }
      .box { fill: #fffefa; stroke: #070707; stroke-width: 3; rx: 8; }
      .lane { fill: #ebe8e2; stroke: #d7d2c9; stroke-width: 2; }
      .note { fill: #fffefa; stroke: #070707; stroke-width: 2; rx: 8; }
      .db { fill: #fffefa; stroke: #070707; stroke-width: 4; }
      .arrow { fill: none; stroke: #3c3633; stroke-width: 5; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #3c3633; stroke-width: 3.5; marker-end: url(#arrow); }
      .dashed { fill: none; stroke: #3c3633; stroke-width: 3.5; stroke-dasharray: 12 10; marker-end: url(#arrow); }
      .num { font: 24px Arial, sans-serif; font-weight: 700; fill: #fffefa; }
      .numCircle { fill: #111; }
      .accent { fill: #f59b23; }
    </style>
  </defs>

  <rect class="bg" width="2600" height="1800"/>

  <text class="title" x="70" y="120">Custom Auth Service</text>
  <text class="subtitle" x="74" y="170">End-to-end flow after removing Clerk: browser cookie sessions, CSRF, roles, clinic authorization, invites, MFA, and machine auth.</text>

  <!-- Column lanes -->
  <rect class="lane" x="60" y="230" width="410" height="1460"/>
  <rect class="lane" x="505" y="230" width="440" height="1460"/>
  <rect class="lane" x="980" y="230" width="430" height="1460"/>
  <rect class="lane" x="1445" y="230" width="500" height="1460"/>
  <rect class="lane" x="1980" y="230" width="550" height="1460"/>

  <text class="laneTitle" x="105" y="280">Browser / Next Web</text>
  <text class="laneTitle" x="555" y="280">Express Auth API</text>
  <text class="laneTitle" x="1030" y="280">Auth Middleware</text>
  <text class="laneTitle" x="1500" y="280">Postgres</text>
  <text class="laneTitle" x="2030" y="280">External / Machine Flows</text>

  <!-- Shared DB cylinder -->
  <g transform="translate(1605 330)">
    <ellipse class="db" cx="105" cy="25" rx="105" ry="25"/>
    <rect class="db" x="0" y="25" width="210" height="145"/>
    <ellipse class="db" cx="105" cy="170" rx="105" ry="25"/>
    <line x1="0" y1="70" x2="210" y2="70" stroke="#070707" stroke-width="3"/>
    <line x1="0" y1="115" x2="210" y2="115" stroke="#070707" stroke-width="3"/>
  </g>
  <text class="boxTitle" x="1625" y="555">Auth + App Tables</text>
  <text class="small" x="1495" y="590">User, ClinicMembership, Session</text>
  <text class="small" x="1495" y="618">InviteToken, PasswordResetToken</text>
  <text class="small" x="1495" y="646">EmailVerificationToken, MfaMethod</text>
  <text class="small" x="1495" y="674">AuditLog, SecurityEvent</text>
  <text class="small" x="1495" y="702">Appointments, Patients, Calls, Settings</text>

  <!-- SECTION 1: Login -->
  <text class="section" x="74" y="345">1. Login creates a secure session</text>

  <rect class="box" x="95" y="385" width="310" height="145"/>
  <circle class="numCircle" cx="125" cy="415" r="18"/><text class="num" x="118" y="424">1</text>
  <text class="boxTitle" x="155" y="420">/sign-in page</text>
  <text class="small" x="125" y="462">User enters email + password</text>
  <text class="small" x="125" y="490">If MFA is enabled, enters TOTP</text>

  <rect class="box" x="555" y="385" width="330" height="145"/>
  <circle class="numCircle" cx="585" cy="415" r="18"/><text class="num" x="578" y="424">2</text>
  <text class="boxTitle" x="615" y="420">POST /api/auth/login</text>
  <text class="small" x="585" y="462">Rate limit request</text>
  <text class="small" x="585" y="490">Verify Argon2id password hash</text>

  <rect class="box" x="1495" y="760" width="360" height="145"/>
  <circle class="numCircle" cx="1525" cy="790" r="18"/><text class="num" x="1518" y="799">3</text>
  <text class="boxTitle" x="1555" y="795">Create Session row</text>
  <text class="small" x="1525" y="837">Store tokenHash only</text>
  <text class="small" x="1525" y="865">Store csrfTokenHash</text>
  <text class="small" x="1525" y="893">Store expiry + device metadata</text>

  <rect class="box" x="95" y="585" width="310" height="155"/>
  <circle class="numCircle" cx="125" cy="615" r="18"/><text class="num" x="118" y="624">4</text>
  <text class="boxTitle" x="155" y="620">Browser receives</text>
  <text class="small" x="125" y="662">HttpOnly session cookie</text>
  <text class="mono" x="125" y="692">dr_session / __Host-dr_session</text>
  <text class="small" x="125" y="720">CSRF token saved by Axios</text>

  <path class="arrow" d="M405 458 L555 458"/>
  <text class="small" x="425" y="440">credentials</text>

  <path class="arrow" d="M885 458 C1120 458 1230 832 1495 832"/>
  <text class="small" x="1040" y="505">valid login</text>

  <path class="arrow" d="M1495 832 C1060 832 690 660 405 660"/>
  <text class="small" x="650" y="735">set cookie + return CSRF</text>

  <!-- SECTION 2: Dashboard loading and protected APIs -->
  <text class="section" x="74" y="835">2. Dashboard requests are authenticated and clinic-scoped</text>

  <rect class="box" x="95" y="875" width="310" height="145"/>
  <circle class="numCircle" cx="125" cy="905" r="18"/><text class="num" x="118" y="914">5</text>
  <text class="boxTitle" x="155" y="910">AuthProvider loads</text>
  <text class="small" x="125" y="952">GET /api/auth/me</text>
  <text class="small" x="125" y="980">Then GET /api/auth/csrf</text>

  <rect class="box" x="1030" y="875" width="330" height="190"/>
  <circle class="numCircle" cx="1060" cy="905" r="18"/><text class="num" x="1053" y="914">6</text>
  <text class="boxTitle" x="1090" y="910">requireAuth</text>
  <text class="small" x="1060" y="952">Read cookie</text>
  <text class="small" x="1060" y="980">Hash token</text>
  <text class="small" x="1060" y="1008">Find active Session</text>
  <text class="small" x="1060" y="1036">Load User + Membership</text>

  <rect class="box" x="1030" y="1125" width="330" height="210"/>
  <circle class="numCircle" cx="1060" cy="1155" r="18"/><text class="num" x="1053" y="1164">7</text>
  <text class="boxTitle" x="1090" y="1160">Authorization checks</text>
  <text class="small" x="1060" y="1202">requireClinic</text>
  <text class="small" x="1060" y="1230">requireCsrf for mutations</text>
  <text class="small" x="1060" y="1258">requirePermission by role</text>
  <text class="small" x="1060" y="1286">Set req.auth.clinicId</text>

  <rect class="box" x="555" y="1125" width="330" height="210"/>
  <circle class="numCircle" cx="585" cy="1155" r="18"/><text class="num" x="578" y="1164">8</text>
  <text class="boxTitle" x="615" y="1160">Dashboard routes</text>
  <text class="small" x="585" y="1202">stats, appointments, patients</text>
  <text class="small" x="585" y="1230">calls, reminders, settings</text>
  <text class="small" x="585" y="1258">available slots</text>
  <text class="small" x="585" y="1296">No route trusts just object ID</text>

  <rect class="box" x="1495" y="1125" width="360" height="210"/>
  <circle class="numCircle" cx="1525" cy="1155" r="18"/><text class="num" x="1518" y="1164">9</text>
  <text class="boxTitle" x="1555" y="1160">Prisma queries</text>
  <text class="small" x="1525" y="1202">where: { clinicId: req.auth.clinicId }</text>
  <text class="small" x="1525" y="1230">appointments scoped by clinic</text>
  <text class="small" x="1525" y="1258">settings scoped by clinic</text>
  <text class="small" x="1525" y="1286">audit sensitive actions</text>

  <path class="arrow" d="M405 948 L1030 948"/>
  <text class="small" x="560" y="925">session cookie sent automatically</text>

  <path class="thin" d="M1195 1065 L1195 1125"/>
  <text class="small" x="1215" y="1102">if session valid</text>

  <path class="arrow" d="M1030 1230 L885 1230"/>
  <text class="small" x="905" y="1208">allow request</text>

  <path class="arrow" d="M885 1230 L1495 1230"/>
  <text class="small" x="995" y="1210">clinic-scoped DB access</text>

  <path class="thin" d="M1525 1335 L1525 1425"/>
  <text class="small" x="1546" y="1382">write AuditLog</text>

  <!-- SECTION 3: Account lifecycle -->
  <text class="section" x="74" y="1445">3. Account lifecycle: invite-only, reset, verify email, MFA</text>

  <rect class="box" x="95" y="1485" width="310" height="150"/>
  <text class="boxTitle" x="125" y="1530">Owner / Admin screens</text>
  <text class="small" x="125" y="1572">Create invite</text>
  <text class="small" x="125" y="1600">Forgot/reset password</text>
  <text class="small" x="125" y="1628">MFA page</text>

  <rect class="box" x="555" y="1485" width="330" height="150"/>
  <text class="boxTitle" x="585" y="1530">Auth lifecycle routes</text>
  <text class="small" x="585" y="1572">/auth/invites</text>
  <text class="small" x="585" y="1600">/auth/forgot-password</text>
  <text class="small" x="585" y="1628">/auth/mfa/setup + verify</text>

  <rect class="box" x="1495" y="1485" width="360" height="150"/>
  <text class="boxTitle" x="1525" y="1530">Token tables</text>
  <text class="small" x="1525" y="1572">Store only token hashes</text>
  <text class="small" x="1525" y="1600">Mark usedAt / acceptedAt</text>
  <text class="small" x="1525" y="1628">Revoke sessions on reset</text>

  <rect class="box" x="2050" y="1465" width="330" height="185"/>
  <text class="boxTitle" x="2085" y="1510">SMTP email</text>
  <text class="small" x="2085" y="1552">Invite link to /accept-invite</text>
  <text class="small" x="2085" y="1580">Reset link to /reset-password</text>
  <text class="small" x="2085" y="1608">Verify link to /verify-email</text>
  <text class="small" x="2085" y="1636">No public signup needed</text>

  <path class="arrow" d="M405 1560 L555 1560"/>
  <path class="arrow" d="M885 1560 L1495 1560"/>
  <path class="arrow" d="M1855 1560 L2050 1560"/>
  <path class="dashed" d="M2050 1620 C1500 1710 780 1710 405 1610"/>
  <text class="small" x="890" y="1718">Email link returns to custom Next page, then API creates/updates user securely</text>

  <!-- SECTION 4: External machine flows -->
  <text class="section" x="2030" y="345">4. Non-browser flows</text>

  <rect class="box" x="2050" y="385" width="330" height="145"/>
  <text class="boxTitle" x="2085" y="430">Vapi webhook</text>
  <text class="small" x="2085" y="472">POST /api/webhook/vapi</text>
  <text class="small" x="2085" y="500">Requires VAPI_WEBHOOK_SECRET</text>

  <rect class="box" x="2050" y="590" width="330" height="155"/>
  <text class="boxTitle" x="2085" y="635">Clinic context for Vapi</text>
  <text class="small" x="2085" y="677">GET /api/clinic/context</text>
  <text class="small" x="2085" y="705">Also machine-authenticated</text>

  <rect class="box" x="2050" y="815" width="330" height="185"/>
  <text class="boxTitle" x="2085" y="860">Google Calendar OAuth</text>
  <text class="small" x="2085" y="902">Browser-authenticated</text>
  <text class="small" x="2085" y="930">Owner/admin integration permission</text>
  <text class="small" x="2085" y="958">Callback checks same clinic</text>

  <path class="arrow" d="M2050 458 L1360 458"/>
  <text class="small" x="1590" y="438">machine secret check</text>
  <path class="thin" d="M2050 675 L1360 675"/>
  <text class="small" x="1570" y="655">machine secret check</text>
  <path class="thin" d="M2050 920 L1360 1230"/>
  <text class="small" x="1720" y="1005">integration permission</text>

  <!-- Bootstrap note -->
  <rect class="note" x="2050" y="1080" width="330" height="150"/>
  <text class="boxTitle" x="2085" y="1125">First owner</text>
  <text class="mono" x="2085" y="1165">npm run auth:bootstrap</text>
  <text class="small" x="2085" y="1200">Creates owner user + membership</text>

  <path class="thin" d="M2050 1165 L1855 832"/>

  <!-- Role summary -->
  <rect class="note" x="980" y="1435" width="430" height="210"/>
  <text class="boxTitle" x="1020" y="1480">Roles and permissions</text>
  <text class="small" x="1020" y="1520">owner: everything, users, integrations</text>
  <text class="small" x="1020" y="1548">admin: appointments + settings</text>
  <text class="small" x="1020" y="1576">staff: appointments + dashboard</text>
  <text class="small" x="1020" y="1604">viewer: read-only dashboard</text>

  <!-- Cookie note -->
  <rect class="note" x="980" y="600" width="430" height="170"/>
  <text class="boxTitle" x="1020" y="645">Cookie rules</text>
  <text class="small" x="1020" y="685">HttpOnly, SameSite=Lax, Path=/</text>
  <text class="small" x="1020" y="713">Secure in production</text>
  <text class="small" x="1020" y="741">Browser never sees raw session data</text>

  <!-- Bottom big idea -->
  <rect class="note" x="540" y="1710" width="1510" height="62"/>
  <text class="boxTitle" x="580" y="1750">Big idea:</text>
  <text class="text" x="705" y="1750">The browser proves identity with a meaningless cookie. The API looks up the session, derives clinic + role, checks CSRF and permissions, then touches only that clinic’s data.</text>
</svg>
